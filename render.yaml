# Render Blueprint — single web service (Docker): Express serves API + React build.
# https://render.com/docs/blueprint-spec
#
# After connect: set OPENROUTER_API_KEY in the Render dashboard (Environment).
# Optional: FRONTEND_URL if you use a custom domain (defaults to RENDER_EXTERNAL_URL).

services:
  - type: web
    name: scribe
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: OPENROUTER_API_KEY
        sync: false
      - key: DEFAULT_MODEL
        value: openrouter/free
      - key: TEMPERATURE
        value: "0.7"
      - key: MAX_TOKENS
        value: "1000"
      - key: DEBUG
        value: "False"
      - key: LOG_LEVEL
        value: INFO
